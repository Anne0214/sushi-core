services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -No -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  member-api:
    build:
      context: .
      dockerfile: Member.API/Dockerfile
    ports:
      - "5131:8080"

  restaurant-api:
    build:
      context: .
      dockerfile: Restaurant.API/Dockerfile
    ports:
      - "5086:8080"

  reservation-api:
    build:
      context: .
      dockerfile: Reservation.API/Dockerfile
    ports:
      - "5087:8080"

  app-api:
    build:
      context: .
      dockerfile: APP.API/Dockerfile
    ports:
      - "5005:5005"
    environment:
      - ConnectionStrings__Default=Server=db;Database=SushiSystem;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - Redis__ConnectionString=redis:6379
      - Member__Domain=http://member-api:8080
      - Restaurant__Domain=http://restaurant-api:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      member-api:
        condition: service_started
      restaurant-api:
        condition: service_started

volumes:
  sqlserver-data:
